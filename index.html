<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Menő Manó – La Linea Runner</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div id="wrap">
  <nav id="navbar">
    <a id="navbar-logo" href="https://52-app.com/" target="_blank" rel="noopener noreferrer" title="52 Apps in 52 Weeks">
      <img src="https://raw.githubusercontent.com/hayimpapa/week00-main-page/main/public/w52.png" alt="52 Apps Logo">
    </a>
    <div id="navbar-tabs">
      <button class="nav-tab active" data-tab="game">Menő Manó</button>
      <button class="nav-tab" data-tab="about">About This Build</button>
    </div>
  </nav>
  <div id="game-view" class="view active">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div class="overlay-inner">
        <div class="title-art">
          <svg width="120" height="80" viewBox="0 0 120 80" fill="none">
            <!-- Stylized La Linea silhouette for title screen -->
            <path d="M40 72 L40 52 Q40 44 44 40 L44 30 Q44 20 50 18 Q56 16 60 18 Q66 16 72 20 Q76 24 74 28 L70 26 Q68 30 62 30 Q58 32 56 36 L56 40 Q60 44 56 52 L56 72" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="62" cy="22" r="2" fill="white"/>
            <line x1="0" y1="72" x2="120" y2="72" stroke="white" stroke-width="3"/>
          </svg>
        </div>
        <h1 id="olTitle">Menő Manó</h1>
        <div class="sub" id="olSub">La Linea Runner</div>
        <div class="score-line" id="olScore"></div>
        <div class="score-line" id="olBest"></div>
        <div class="difficulty-select">
          <button class="diff-btn" data-diff="easy">Easy</button>
          <button class="diff-btn active" data-diff="normal">Normal</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </div>
        <button id="olBtn">PLAY</button>
        <div class="controls-hint">
          <span>1/A/←</span><span>2/S/↑</span><span>3/D/→</span><span>4/F/↓</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Tutorial popup -->
  <div id="tutorial" class="hidden">
    <div class="tutorial-inner">
      <h2>How to Play</h2>
      <div class="tutorial-rules">
        <div class="tutorial-rule"><span class="tutorial-icon">🕳️</span> <strong>Gap</strong> → tap <em>Bridge</em></div>
        <div class="tutorial-rule"><span class="tutorial-icon">🧱</span> <strong>Wall</strong> → tap <em>Ladder</em></div>
        <div class="tutorial-rule"><span class="tutorial-icon">🪨</span> <strong>Boulder</strong> → tap <em>Smash</em></div>
        <div class="tutorial-rule"><span class="tutorial-icon">🐦</span> <strong>Bird</strong> → tap <em>Duck</em></div>
      </div>
      <p class="tutorial-tip">React before the obstacle reaches Manó!</p>
      <label class="tutorial-forget">
        <input type="checkbox" id="tutorialForget"> Don't show again
      </label>
      <button id="tutorialOk">GOT IT</button>
    </div>
  </div>

  <div id="controls">
    <button class="btn" data-action="bridge">
      <svg width="44" height="30" viewBox="0 0 44 30">
        <path d="M4 26 Q22 4 40 26" stroke="currentColor" stroke-width="2.5" fill="none"/>
        <line x1="12" y1="18" x2="12" y2="26" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <line x1="22" y1="10" x2="22" y2="26" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <line x1="32" y1="18" x2="32" y2="26" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <line x1="2" y1="27" x2="42" y2="27" stroke="currentColor" stroke-width="2.5"/>
      </svg>
      <span>Bridge</span>
    </button>
    <button class="btn" data-action="ladder">
      <svg width="44" height="30" viewBox="0 0 44 30">
        <line x1="15" y1="3" x2="15" y2="27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="29" y1="3" x2="29" y2="27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="15" y1="7" x2="29" y2="7" stroke="currentColor" stroke-width="2"/>
        <line x1="15" y1="13" x2="29" y2="13" stroke="currentColor" stroke-width="2"/>
        <line x1="15" y1="19" x2="29" y2="19" stroke="currentColor" stroke-width="2"/>
        <line x1="15" y1="25" x2="29" y2="25" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span>Ladder</span>
    </button>
    <button class="btn" data-action="smash">
      <svg width="44" height="30" viewBox="0 0 44 30">
        <!-- Fist smashing -->
        <path d="M14 18 L14 10 Q14 6 18 6 L28 6 Q32 6 32 10 L32 16 Q32 18 30 18 Z" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
        <line x1="18" y1="10" x2="18" y2="6" stroke="currentColor" stroke-width="1.5"/>
        <line x1="22" y1="10" x2="22" y2="6" stroke="currentColor" stroke-width="1.5"/>
        <line x1="26" y1="10" x2="26" y2="6" stroke="currentColor" stroke-width="1.5"/>
        <!-- Impact lines -->
        <line x1="8" y1="12" x2="4" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="36" y1="12" x2="40" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="20" x2="22" y2="26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="22" x2="10" y2="26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="30" y1="22" x2="34" y2="26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Smash</span>
    </button>
    <button class="btn" data-action="duck">
      <svg width="44" height="30" viewBox="0 0 44 30">
        <path d="M14 8 Q14 4 22 4 Q30 4 30 10 Q30 14 26 16 L26 20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M22 20 L16 26 M22 20 L28 26 M22 20 L22 26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="24" cy="8" r="1.5" fill="currentColor"/>
      </svg>
      <span>Duck</span>
    </button>
  </div>
  </div>

  <div id="about-view" class="view"></div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
