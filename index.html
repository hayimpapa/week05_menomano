<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Menő Manó – La Linea Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #wrap {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
  }
  canvas {
    display: block;
    flex: 1;
    width: 100%;
  }
  #controls {
    display: flex;
    gap: 8px;
    padding: 10px 8px 14px;
    justify-content: center;
    background: #111;
  }
  .btn {
    flex: 1;
    max-width: 100px;
    padding: 14px 4px 10px;
    border: 2px solid #444;
    border-radius: 14px;
    background: #222;
    color: #ccc;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    transition: background .1s, border-color .1s, transform .08s;
    line-height: 1.15;
  }
  .btn svg { display: block; margin: 0 auto 4px; }
  .btn:active, .btn.pressed {
    background: #444;
    border-color: #fff;
    transform: scale(0.95);
  }
  .btn.correct {
    background: #1b5e20;
    border-color: #4caf50;
  }
  .btn.wrong {
    background: #7f0000;
    border-color: #f44336;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 10;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    color: #fff;
    font-size: 32px;
    margin-bottom: 6px;
  }
  #overlay .sub {
    color: #aaa;
    font-size: 18px;
    margin-bottom: 20px;
  }
  #overlay .score-line {
    color: #ffd54f;
    font-size: 22px;
    margin-bottom: 4px;
  }
  #overlay button {
    margin-top: 18px;
    padding: 14px 40px;
    font-size: 20px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    background: #ffd54f;
    color: #111;
    cursor: pointer;
  }
  #overlay button:active { background: #ffc107; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="controls">
    <button class="btn" data-action="bridge">
      <svg width="36" height="28" viewBox="0 0 36 28"><path d="M2 24 Q18 8 34 24" stroke="#aaa" stroke-width="3" fill="none"/><line x1="2" y1="24" x2="34" y2="24" stroke="#aaa" stroke-width="2"/></svg>
      Bridge
    </button>
    <button class="btn" data-action="trampoline">
      <svg width="36" height="28" viewBox="0 0 36 28"><ellipse cx="18" cy="22" rx="14" ry="4" stroke="#aaa" stroke-width="2.5" fill="none"/><path d="M8 22 Q18 8 28 22" stroke="#aaa" stroke-width="2" fill="none" stroke-dasharray="3,2"/></svg>
      Tramp
    </button>
    <button class="btn" data-action="ladder">
      <svg width="36" height="28" viewBox="0 0 36 28"><line x1="12" y1="2" x2="12" y2="26" stroke="#aaa" stroke-width="2.5"/><line x1="24" y1="2" x2="24" y2="26" stroke="#aaa" stroke-width="2.5"/><line x1="12" y1="8" x2="24" y2="8" stroke="#aaa" stroke-width="2"/><line x1="12" y1="14" x2="24" y2="14" stroke="#aaa" stroke-width="2"/><line x1="12" y1="20" x2="24" y2="20" stroke="#aaa" stroke-width="2"/></svg>
      Ladder
    </button>
    <button class="btn" data-action="duck">
      <svg width="36" height="28" viewBox="0 0 36 28"><path d="M10 18 Q10 10 18 10 Q26 10 26 16" stroke="#aaa" stroke-width="2.5" fill="none"/><circle cx="20" cy="12" r="1.5" fill="#aaa"/><line x1="26" y1="16" x2="30" y2="14" stroke="#aaa" stroke-width="2"/><line x1="10" y1="22" x2="30" y2="22" stroke="#aaa" stroke-width="2"/></svg>
      Duck
    </button>
  </div>
  <div id="overlay">
    <h1 id="olTitle">Menő Manó</h1>
    <div class="sub" id="olSub">La Linea Runner</div>
    <div class="score-line" id="olScore"></div>
    <div class="score-line" id="olBest"></div>
    <button id="olBtn">START</button>
  </div>
</div>

<script>
// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const olTitle = document.getElementById('olTitle');
const olSub = document.getElementById('olSub');
const olScore = document.getElementById('olScore');
const olBest = document.getElementById('olBest');
const olBtn = document.getElementById('olBtn');
const buttons = document.querySelectorAll('.btn');

let W, H, groundY, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  groundY = H * 0.72;
}
window.addEventListener('resize', resize);
resize();

// ── Constants ──
const MANO_X = 70;                 // Mano's fixed screen X
const BASE_SPEED = 1.8;            // starting scroll px/frame
const SPEED_INC = 0.08;            // speed increase per obstacle passed
const MAX_SPEED = 7;
const OBS_MIN_GAP = 280;           // min px between obstacles
const OBS_MAX_GAP = 500;
const ACTION_WINDOW = 120;         // px range before obstacle to accept input
const GAP_WIDTH = 80;
const WALL_HEIGHT = 70;
const WALL_WIDTH = 18;

// ── Game state ──
let state = 'menu'; // menu | running | acting | dead
let score = 0;
let best = parseInt(localStorage.getItem('mano_best') || '0', 10);
let speed = BASE_SPEED;
let obstacles = [];
let nextObsDist = 300;
let manoAnim = 0;       // walk animation phase
let actionTimer = 0;    // frames remaining in action animation
let actionType = '';     // which action is playing
let actionSuccess = false;
let manoY = 0;           // vertical offset for animations
let manoSquish = false;  // ducking
let deadTimer = 0;
let lineSegments = [];   // the ground line pieces

// obstacle types and valid actions
const OBS_TYPES = ['gap', 'wall', 'bird'];
const VALID_ACTIONS = {
  gap: ['bridge'],
  wall: ['trampoline', 'ladder'],
  bird: ['duck']
};

// ── Obstacle spawning ──
function spawnObstacle() {
  // weight types: gap & wall more common early, birds after score 3
  const types = score < 3
    ? ['gap', 'wall']
    : ['gap', 'wall', 'bird', 'gap', 'wall', 'bird'];
  const type = types[Math.floor(Math.random() * types.length)];
  const x = W + 40;
  obstacles.push({ type, x, passed: false, acted: false });
  nextObsDist = OBS_MIN_GAP + Math.random() * (OBS_MAX_GAP - OBS_MIN_GAP);
}

// ── Start / Restart ──
function startGame() {
  state = 'running';
  score = 0;
  speed = BASE_SPEED;
  obstacles = [];
  nextObsDist = 300;
  manoAnim = 0;
  actionTimer = 0;
  actionType = '';
  manoY = 0;
  manoSquish = false;
  deadTimer = 0;
  overlay.classList.add('hidden');
  clearButtonEffects();
}

function showMenu(isDead) {
  state = 'menu';
  if (isDead) {
    if (score > best) {
      best = score;
      localStorage.setItem('mano_best', String(best));
    }
    olTitle.textContent = 'Game Over!';
    olSub.textContent = '';
    olScore.textContent = 'Score: ' + score;
    olBest.textContent = 'Best: ' + best;
    olBtn.textContent = 'RETRY';
  } else {
    olTitle.textContent = 'Menő Manó';
    olSub.textContent = 'La Linea Runner';
    olScore.textContent = best > 0 ? 'Best: ' + best : '';
    olBest.textContent = '';
    olBtn.textContent = 'START';
  }
  overlay.classList.remove('hidden');
}

olBtn.addEventListener('click', startGame);
olBtn.addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });

// ── Player input ──
function clearButtonEffects() {
  buttons.forEach(b => { b.classList.remove('correct', 'wrong', 'pressed'); });
}

function handleAction(action) {
  if (state !== 'running') return;

  // Find the nearest unacted obstacle within the action window
  let target = null;
  for (const obs of obstacles) {
    if (obs.acted || obs.passed) continue;
    const dist = obs.x - MANO_X;
    if (dist < ACTION_WINDOW && dist > -30) {
      target = obs;
      break;
    }
  }

  if (!target) {
    // pressed too early or no obstacle near – wrong
    flashButton(action, false);
    die();
    return;
  }

  const valid = VALID_ACTIONS[target.type];
  if (valid.includes(action)) {
    // correct!
    target.acted = true;
    actionType = action;
    actionSuccess = true;
    actionTimer = 40;
    state = 'acting';
    flashButton(action, true);
  } else {
    // wrong action
    flashButton(action, false);
    die();
  }
}

function flashButton(action, success) {
  clearButtonEffects();
  buttons.forEach(b => {
    if (b.dataset.action === action) {
      b.classList.add(success ? 'correct' : 'wrong');
    }
  });
  setTimeout(clearButtonEffects, 400);
}

function die() {
  state = 'dead';
  deadTimer = 60;
}

// Button events (both touch and mouse)
buttons.forEach(btn => {
  const action = btn.dataset.action;
  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    btn.classList.add('pressed');
    handleAction(action);
  });
  btn.addEventListener('pointerup', () => btn.classList.remove('pressed'));
  btn.addEventListener('pointerleave', () => btn.classList.remove('pressed'));
});

// Keyboard support
const KEY_MAP = { '1': 'bridge', '2': 'trampoline', '3': 'ladder', '4': 'duck',
                  'a': 'bridge', 's': 'trampoline', 'd': 'ladder', 'f': 'duck' };
document.addEventListener('keydown', (e) => {
  const action = KEY_MAP[e.key.toLowerCase()];
  if (action) handleAction(action);
  if (e.key === ' ' || e.key === 'Enter') {
    if (state === 'menu') startGame();
  }
});

// ── Drawing helpers ──
const LINE_COLOR = '#e0e0e0';
const BG_GRAD_TOP = '#16213e';
const BG_GRAD_BOT = '#0f3460';

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, BG_GRAD_TOP);
  grad.addColorStop(1, BG_GRAD_BOT);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawGround() {
  ctx.strokeStyle = LINE_COLOR;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();

  // Draw ground line, skipping gaps
  let x = 0;
  const gapObs = obstacles.filter(o => o.type === 'gap');
  // sort by x
  const sortedGaps = gapObs.slice().sort((a, b) => a.x - b.x);

  ctx.moveTo(0, groundY);
  let prevX = 0;
  for (const gap of sortedGaps) {
    const gx1 = gap.x - GAP_WIDTH / 2;
    const gx2 = gap.x + GAP_WIDTH / 2;
    if (gx1 > prevX) {
      ctx.lineTo(Math.max(gx1, 0), groundY);
    }
    if (gx2 > 0 && gx1 < W) {
      ctx.moveTo(Math.min(Math.max(gx2, 0), W), groundY);
    }
    prevX = gx2;
  }
  ctx.lineTo(W, groundY);
  ctx.stroke();

  // Draw bridge over gaps if acted
  for (const gap of sortedGaps) {
    if (!gap.acted) continue;
    const gx1 = gap.x - GAP_WIDTH / 2;
    const gx2 = gap.x + GAP_WIDTH / 2;
    ctx.strokeStyle = '#ffd54f';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(gx1, groundY);
    ctx.quadraticCurveTo(gap.x, groundY - 14, gx2, groundY);
    ctx.stroke();
    // planks
    ctx.strokeStyle = '#ffd54f';
    ctx.lineWidth = 1.5;
    for (let px = gx1 + 8; px < gx2 - 4; px += 10) {
      ctx.beginPath();
      const t = (px - gx1) / GAP_WIDTH;
      const py = groundY - Math.sin(t * Math.PI) * 14;
      ctx.moveTo(px, py - 3);
      ctx.lineTo(px, py + 3);
      ctx.stroke();
    }
    ctx.strokeStyle = LINE_COLOR;
    ctx.lineWidth = 3;
  }
}

function drawWall(obs) {
  const wx = obs.x - WALL_WIDTH / 2;
  ctx.fillStyle = '#555';
  ctx.strokeStyle = LINE_COLOR;
  ctx.lineWidth = 2.5;
  ctx.fillRect(wx, groundY - WALL_HEIGHT, WALL_WIDTH, WALL_HEIGHT);
  ctx.strokeRect(wx, groundY - WALL_HEIGHT, WALL_WIDTH, WALL_HEIGHT);

  // Draw ladder or trampoline if acted
  if (obs.acted) {
    if (actionType === 'ladder') {
      ctx.strokeStyle = '#ffd54f';
      ctx.lineWidth = 2;
      const lx = obs.x - WALL_WIDTH / 2 - 16;
      // side rails
      ctx.beginPath();
      ctx.moveTo(lx, groundY);
      ctx.lineTo(lx + 6, groundY - WALL_HEIGHT - 6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(lx + 14, groundY);
      ctx.lineTo(lx + 20, groundY - WALL_HEIGHT - 6);
      ctx.stroke();
      // rungs
      for (let ry = groundY - 12; ry > groundY - WALL_HEIGHT - 4; ry -= 12) {
        const t = (groundY - ry) / (WALL_HEIGHT + 6);
        ctx.beginPath();
        ctx.moveTo(lx + t * 6, ry);
        ctx.lineTo(lx + 14 + t * 6, ry);
        ctx.stroke();
      }
    } else if (actionType === 'trampoline') {
      ctx.strokeStyle = '#ffd54f';
      ctx.lineWidth = 2.5;
      const tx = obs.x - WALL_WIDTH / 2 - 30;
      // base
      ctx.beginPath();
      ctx.moveTo(tx, groundY);
      ctx.lineTo(tx + 10, groundY - 16);
      ctx.lineTo(tx + 30, groundY - 16);
      ctx.lineTo(tx + 40, groundY);
      ctx.stroke();
      // surface
      ctx.beginPath();
      ctx.ellipse(tx + 20, groundY - 18, 18, 4, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

function drawBird(obs) {
  const bx = obs.x;
  const by = groundY - 50 + Math.sin(bx * 0.04) * 8;
  const wingPhase = Math.sin(Date.now() * 0.012 + bx) * 12;
  ctx.strokeStyle = '#e57373';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  // body
  ctx.beginPath();
  ctx.ellipse(bx, by, 12, 6, 0, 0, Math.PI * 2);
  ctx.stroke();
  // wings
  ctx.beginPath();
  ctx.moveTo(bx - 4, by - 4);
  ctx.quadraticCurveTo(bx - 10, by - 14 + wingPhase, bx - 18, by - 8 + wingPhase);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx + 4, by - 4);
  ctx.quadraticCurveTo(bx + 10, by - 14 + wingPhase, bx + 18, by - 8 + wingPhase);
  ctx.stroke();
  // beak
  ctx.beginPath();
  ctx.moveTo(bx - 12, by - 1);
  ctx.lineTo(bx - 20, by + 1);
  ctx.stroke();
  // eye
  ctx.fillStyle = '#e57373';
  ctx.beginPath();
  ctx.arc(bx - 6, by - 2, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

// ── Draw Mano (La Linea style) ──
function drawMano() {
  const mx = MANO_X;
  const baseY = groundY + manoY;
  const walkCycle = Math.sin(manoAnim * 0.15);
  const isDucking = manoSquish || (state === 'acting' && actionType === 'duck');

  ctx.strokeStyle = LINE_COLOR;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (isDucking) {
    // Ducking pose – squished down
    const duckY = baseY;
    // body (hunched)
    ctx.beginPath();
    ctx.moveTo(mx, duckY);         // feet
    ctx.lineTo(mx, duckY - 14);    // short legs
    ctx.quadraticCurveTo(mx + 6, duckY - 20, mx + 2, duckY - 24); // hunched body
    ctx.stroke();
    // head (lower)
    ctx.beginPath();
    ctx.arc(mx + 2, duckY - 30, 7, 0, Math.PI * 2);
    ctx.stroke();
    // nose
    ctx.beginPath();
    ctx.moveTo(mx + 9, duckY - 31);
    ctx.lineTo(mx + 16, duckY - 33);
    ctx.stroke();
  } else {
    // Normal walking Mano
    const bodyTop = baseY - 50;
    const hipY = baseY - 18;

    // Legs with walk animation
    ctx.beginPath();
    ctx.moveTo(mx - 6 + walkCycle * 5, baseY);
    ctx.lineTo(mx, hipY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(mx + 6 - walkCycle * 5, baseY);
    ctx.lineTo(mx, hipY);
    ctx.stroke();

    // Body
    ctx.beginPath();
    ctx.moveTo(mx, hipY);
    ctx.lineTo(mx, bodyTop);
    ctx.stroke();

    // Arms with swing
    ctx.beginPath();
    ctx.moveTo(mx, bodyTop + 12);
    ctx.lineTo(mx - 10 - walkCycle * 4, bodyTop + 22);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(mx, bodyTop + 12);
    ctx.lineTo(mx + 10 + walkCycle * 4, bodyTop + 22);
    ctx.stroke();

    // Head
    ctx.beginPath();
    ctx.arc(mx, bodyTop - 8, 9, 0, Math.PI * 2);
    ctx.stroke();

    // Big La Linea nose
    ctx.beginPath();
    ctx.moveTo(mx + 8, bodyTop - 10);
    ctx.lineTo(mx + 18, bodyTop - 12);
    ctx.lineTo(mx + 12, bodyTop - 6);
    ctx.stroke();

    // Eye
    ctx.fillStyle = LINE_COLOR;
    ctx.beginPath();
    ctx.arc(mx + 3, bodyTop - 11, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHUD() {
  ctx.fillStyle = '#ffd54f';
  ctx.font = 'bold 22px "Segoe UI", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('Score: ' + score, W - 16, 32);

  ctx.fillStyle = '#888';
  ctx.font = '15px "Segoe UI", sans-serif';
  ctx.fillText('Best: ' + best, W - 16, 52);

  // Speed indicator
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.font = '13px "Segoe UI", sans-serif';
  ctx.fillText('Speed: ' + speed.toFixed(1) + 'x', 12, 28);
}

function drawDeathEffect() {
  if (state !== 'dead') return;
  const alpha = deadTimer / 60;
  ctx.fillStyle = `rgba(255,0,0,${alpha * 0.3})`;
  ctx.fillRect(0, 0, W, H);

  // Mano tantrum squiggles
  ctx.strokeStyle = `rgba(255,200,200,${alpha})`;
  ctx.lineWidth = 2;
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + Date.now() * 0.01;
    const r = 20 + (60 - deadTimer) * 0.8;
    ctx.beginPath();
    ctx.moveTo(MANO_X + Math.cos(angle) * r, groundY - 30 + Math.sin(angle) * r);
    ctx.lineTo(MANO_X + Math.cos(angle) * (r + 10), groundY - 30 + Math.sin(angle) * (r + 10));
    ctx.stroke();
  }
}

// ── Action animations ──
function updateAction() {
  if (state !== 'acting') return;
  actionTimer--;

  if (actionType === 'trampoline' || actionType === 'ladder') {
    // Arc over wall
    const t = 1 - actionTimer / 40;
    manoY = -Math.sin(t * Math.PI) * (WALL_HEIGHT + 20);
  } else if (actionType === 'duck') {
    manoSquish = true;
  } else if (actionType === 'bridge') {
    // slight dip then up crossing gap
    const t = 1 - actionTimer / 40;
    manoY = -Math.sin(t * Math.PI) * 6;
  }

  if (actionTimer <= 0) {
    state = 'running';
    actionType = '';
    manoY = 0;
    manoSquish = false;
    score++;
    speed = Math.min(MAX_SPEED, BASE_SPEED + score * SPEED_INC);
  }
}

// ── Collision check ──
function checkCollision() {
  for (const obs of obstacles) {
    if (obs.acted || obs.passed) continue;
    // Did the obstacle reach Mano without being acted on?
    if (obs.type === 'gap') {
      const gx1 = obs.x - GAP_WIDTH / 2;
      const gx2 = obs.x + GAP_WIDTH / 2;
      if (MANO_X > gx1 && MANO_X < gx2) {
        die();
        return;
      }
    } else if (obs.type === 'wall') {
      if (Math.abs(obs.x - MANO_X) < WALL_WIDTH / 2 + 8) {
        die();
        return;
      }
    } else if (obs.type === 'bird') {
      if (Math.abs(obs.x - MANO_X) < 18) {
        die();
        return;
      }
    }
  }
}

// ── Main game loop ──
function update() {
  if (state === 'running' || state === 'acting') {
    manoAnim++;

    // Move obstacles
    for (const obs of obstacles) {
      obs.x -= speed;
    }

    // Mark passed
    for (const obs of obstacles) {
      if (!obs.passed && obs.x < MANO_X - 60) {
        obs.passed = true;
        if (!obs.acted && state === 'running') {
          // They somehow slipped through (shouldn't happen with collision)
        }
      }
    }

    // Remove off-screen
    obstacles = obstacles.filter(o => o.x > -100);

    // Spawn new
    nextObsDist -= speed;
    if (nextObsDist <= 0) {
      spawnObstacle();
    }

    // Update action
    updateAction();

    // Check collision (only in running state)
    if (state === 'running') {
      checkCollision();
    }
  }

  if (state === 'dead') {
    deadTimer--;
    if (deadTimer <= 0) {
      showMenu(true);
    }
  }
}

function draw() {
  drawBackground();
  drawGround();

  // Draw obstacles
  for (const obs of obstacles) {
    if (obs.type === 'wall') drawWall(obs);
    if (obs.type === 'bird') drawBird(obs);
    // gaps are drawn by the ground line logic
  }

  drawMano();
  drawHUD();
  drawDeathEffect();
}

function loop() {
  resize(); // handle dynamic resize
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── Init ──
showMenu(false);
loop();
</script>
</body>
</html>
