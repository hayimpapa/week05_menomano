<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Menő Manó – La Linea Runner</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div id="wrap">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div class="overlay-inner">
        <div class="title-art">
          <svg width="120" height="80" viewBox="0 0 120 80" fill="none">
            <!-- Stylized La Linea silhouette for title screen -->
            <path d="M40 72 L40 52 Q40 44 44 40 L44 30 Q44 20 50 18 Q56 16 60 18 Q66 16 72 20 Q76 24 74 28 L70 26 Q68 30 62 30 Q58 32 56 36 L56 40 Q60 44 56 52 L56 72" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="62" cy="22" r="2" fill="white"/>
            <line x1="0" y1="72" x2="120" y2="72" stroke="white" stroke-width="3"/>
          </svg>
        </div>
        <h1 id="olTitle">Menő Manó</h1>
        <div class="sub" id="olSub">La Linea Runner</div>
        <div class="score-line" id="olScore"></div>
        <div class="score-line" id="olBest"></div>
        <button id="olBtn">PLAY</button>
        <div class="controls-hint">
          <span>1/A</span><span>2/S</span><span>3/D</span><span>4/F</span>
        </div>
      </div>
    </div>
  </div>

  <div id="controls">
    <button class="btn" data-action="bridge">
      <svg width="44" height="30" viewBox="0 0 44 30">
        <path d="M4 26 Q22 4 40 26" stroke="currentColor" stroke-width="2.5" fill="none"/>
        <line x1="12" y1="18" x2="12" y2="26" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <line x1="22" y1="10" x2="22" y2="26" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <line x1="32" y1="18" x2="32" y2="26" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <line x1="2" y1="27" x2="42" y2="27" stroke="currentColor" stroke-width="2.5"/>
      </svg>
      <span>Bridge</span>
    </button>
    <button class="btn" data-action="trampoline">
      <svg width="44" height="30" viewBox="0 0 44 30">
        <path d="M8 26 L14 14 L30 14 L36 26" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
        <ellipse cx="22" cy="12" rx="12" ry="3" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M22 10 L22 4 M18 6 L22 2 L26 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Tramp</span>
    </button>
    <button class="btn" data-action="ladder">
      <svg width="44" height="30" viewBox="0 0 44 30">
        <line x1="15" y1="3" x2="15" y2="27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="29" y1="3" x2="29" y2="27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="15" y1="7" x2="29" y2="7" stroke="currentColor" stroke-width="2"/>
        <line x1="15" y1="13" x2="29" y2="13" stroke="currentColor" stroke-width="2"/>
        <line x1="15" y1="19" x2="29" y2="19" stroke="currentColor" stroke-width="2"/>
        <line x1="15" y1="25" x2="29" y2="25" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span>Ladder</span>
    </button>
    <button class="btn" data-action="duck">
      <svg width="44" height="30" viewBox="0 0 44 30">
        <path d="M14 8 Q14 4 22 4 Q30 4 30 10 Q30 14 26 16 L26 20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M22 20 L16 26 M22 20 L28 26 M22 20 L22 26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="24" cy="8" r="1.5" fill="currentColor"/>
      </svg>
      <span>Duck</span>
    </button>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
